<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0B1120"/>
  <!-- Golden core -->
  <circle cx="16" cy="16" r="5" fill="#FFCC33" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#FFB800" stroke-width="0.5" opacity="0.4"/>
  <!-- Specular -->
  <circle cx="14.5" cy="14.5" r="1.5" fill="white" opacity="0.4"/>
  <!-- Cyan dot - top -->
  <circle cx="16" cy="5" r="2.2" fill="#00F0FF"/>
  <!-- Pink dot - bottom right -->
  <circle cx="24" cy="21" r="2" fill="#FF2D78"/>
  <!-- Green dot - bottom left -->
  <circle cx="8" cy="21" r="1.8" fill="#39FF14"/>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
