<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Flow — Team Productivity System</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Unregister any stale service workers from previous deployments
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) { registration.unregister(); });
        });
      }
      // Force reload when restored from bfcache (back-forward cache)
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) window.location.reload();
      });
      // Auto-refresh if running a stale cached version
      (function() {
        var CURRENT_VERSION = "2";
        try {
          fetch("/version.json?t=" + Date.now(), { cache: "no-store" })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              if (data.version && data.version !== CURRENT_VERSION) {
                window.location.reload();
              }
            })
            .catch(function() {});
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
