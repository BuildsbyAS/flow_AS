<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0B1120"/>
  <!-- Golden core -->
  <circle cx="16" cy="16" r="4" fill="#FFCC33" filter="url(#gd)"/>
  <circle cx="15" cy="15" r="1.2" fill="white" opacity="0.4"/>
  <!-- Cyan — sweeping in from top-left -->
  <circle cx="7" cy="8" r="2.2" fill="#00F0FF"/>
  <line x1="9" y1="9.5" x2="13" y2="13.5" stroke="#00F0FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Pink — sweeping in from top-right -->
  <circle cx="25" cy="8" r="2" fill="#FF2D78"/>
  <line x1="23" y1="9.5" x2="19" y2="13.5" stroke="#FF2D78" stroke-width="0.5" opacity="0.3"/>
  <!-- Green — sweeping in from bottom -->
  <circle cx="16" cy="26" r="1.8" fill="#39FF14"/>
  <line x1="16" y1="24.2" x2="16" y2="20" stroke="#39FF14" stroke-width="0.5" opacity="0.3"/>
  <defs>
    <filter id="gd"><feGaussianBlur stdDeviation="1.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
