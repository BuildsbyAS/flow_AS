<style>
  .spark {
    transform-box: fill-box;
    transform-origin: center;
    animation: sparkDrift 3.4s ease-in-out infinite;
    will-change: transform, opacity;
  }
  @keyframes sparkDrift {
    0%, 100% { transform: translate(0px, 0px); opacity: 1; }
    50%      { transform: translate(0px, -4px); opacity: 0.55; }
  }
  .s1 { animation-delay: 0s; }
  .s2 { animation-delay: 0.45s; }
  .s3 { animation-delay: 0.9s; }
  .s4 { animation-delay: 1.3s; }
  .s5 { animation-delay: 0.2s; }
  .s6 { animation-delay: 1.7s; }
  .s7 { animation-delay: 0.65s; }
  .s8 { animation-delay: 1.1s; }
  .s9 { animation-delay: 2.0s; }
  .s10 { animation-delay: 1.5s; }
</style>
